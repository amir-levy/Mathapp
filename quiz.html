<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חידון חשבון</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #f0f7ff;
    --correct: #4CAF82;
    --wrong: #FF6B6B;
    --blue: #4D96FF;
    --purple: #9B72CF;
    --sun: #FFD93D;
    --dark: #1e2a3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--sky);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px; overflow-x: hidden; position: relative;
  }
  .bg-blob {
    position: fixed; border-radius: 50%; filter: blur(60px);
    opacity: 0.15; pointer-events: none; z-index: 0;
    animation: drift 12s ease-in-out infinite;
  }
  .bg-blob:nth-child(1) { width:400px;height:400px;background:var(--blue);top:-100px;right:-100px; }
  .bg-blob:nth-child(2) { width:300px;height:300px;background:var(--purple);bottom:-80px;left:-80px;animation-delay:4s; }
  .bg-blob:nth-child(3) { width:200px;height:200px;background:var(--sun);top:40%;left:10%;animation-delay:8s; }
  @keyframes drift { 0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(20px,-20px) scale(1.05);} }

  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 580px;
    display: flex; flex-direction: column;
    align-items: center; gap: 20px;
  }
  .header { text-align: center; }
  .header h1 { font-family:'Fredoka One',cursive;font-size:3rem;color:var(--blue);text-shadow:4px 4px 0 rgba(77,150,255,0.15);line-height:1; }
  .header p { color:#8aa;font-size:1rem;margin-top:4px; }

  .score-bar {
    background:white;border-radius:50px;padding:10px 28px;
    display:flex;gap:20px;align-items:center;
    box-shadow:0 4px 24px rgba(0,0,0,0.07);
  }
  .score-item{display:flex;align-items:center;gap:6px;font-weight:700;font-size:1.05rem;}
  .score-item.c{color:var(--correct);}
  .score-item.w{color:var(--wrong);}
  .score-sep{width:1px;height:18px;background:#e8eef5;}

  .q-card {
    background:white;border-radius:28px;width:100%;
    box-shadow:0 8px 48px rgba(0,0,0,0.09);overflow:hidden;
    animation:popIn 0.45s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from{opacity:0;transform:scale(0.9) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);} }

  .illustration-area {
    background:linear-gradient(135deg,#f0f7ff 0%,#e8f0ff 100%);
    padding:24px;min-height:180px;
    display:flex;align-items:center;justify-content:center;
    position:relative;overflow:hidden;
  }
  .illustration-area::after {
    content:'';position:absolute;bottom:-2px;left:0;right:0;
    height:24px;background:white;
    border-radius:50% 50% 0 0 / 100% 100% 0 0;
  }
  .illustration-area svg { max-width:220px;max-height:160px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.1)); }
  .no-ill { color:#bbc;font-size:3rem; }

  .q-body { padding:28px 28px 24px; }
  .diff-badge {
    display:inline-block;padding:4px 14px;border-radius:20px;
    font-size:0.78rem;font-weight:700;margin-bottom:16px;letter-spacing:0.03em;
  }
  .diff-badge.d1{background:#e8f8f0;color:var(--correct);}
  .diff-badge.d2{background:#fff5e0;color:#e08a00;}
  .diff-badge.d3{background:#ffeaea;color:var(--wrong);}

  .q-text {
    font-size:2.4rem;font-weight:800;color:var(--dark);
    text-align:center;margin-bottom:28px;direction:ltr;line-height:1.2;
  }
  .options-grid { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
  .opt-btn {
    background:#f6f9ff;border:2.5px solid #e2eaff;border-radius:16px;
    padding:16px 10px;font-family:'Fredoka One',cursive;font-size:1.9rem;
    color:var(--dark);cursor:pointer;
    transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);text-align:center;
  }
  .opt-btn:hover:not(:disabled){border-color:var(--blue);background:#eaf1ff;transform:translateY(-3px) scale(1.04);box-shadow:0 8px 24px rgba(77,150,255,0.18);}
  .opt-btn:active:not(:disabled){transform:scale(0.96);}
  .opt-btn.correct{background:#eaf8f0;border-color:var(--correct);color:var(--correct);animation:pop 0.4s cubic-bezier(0.34,1.56,0.64,1);}
  .opt-btn.wrong{background:#ffeaea;border-color:var(--wrong);color:var(--wrong);animation:shake 0.4s ease;}
  .opt-btn.reveal{background:#eaf8f0;border-color:var(--correct);color:var(--correct);opacity:0.6;}
  .opt-btn:disabled{cursor:not-allowed;}
  @keyframes pop{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}

  .feedback {
    margin-top:16px;padding:12px 16px;border-radius:14px;
    font-size:1.1rem;font-weight:700;text-align:center;
    display:none;animation:fadeUp 0.3s ease;
  }
  .feedback.correct{background:#eaf8f0;color:var(--correct);display:block;}
  .feedback.wrong{background:#ffeaea;color:var(--wrong);display:block;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  .next-btn {
    background:linear-gradient(135deg,var(--blue),var(--purple));
    color:white;border:none;border-radius:50px;
    padding:15px 50px;font-family:'Fredoka One',cursive;font-size:1.4rem;
    cursor:pointer;box-shadow:0 6px 28px rgba(77,150,255,0.35);
    transition:all 0.2s;display:none;animation:fadeUp 0.3s ease;
  }
  .next-btn:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(77,150,255,0.45);}
  .next-btn.show{display:block;}

  .state-card {
    background:white;border-radius:28px;padding:56px 40px;
    text-align:center;box-shadow:0 8px 48px rgba(0,0,0,0.08);
    width:100%;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .state-card .big{font-size:4.5rem;margin-bottom:14px;}
  .state-card h2{font-size:1.7rem;font-weight:800;color:var(--dark);margin-bottom:8px;}
  .state-card p{color:#8aa;font-size:1rem;}
  .loading-spinner{width:52px;height:52px;border:5px solid #e8eef5;border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 18px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .config-box{background:#fffbec;border:2px solid #ffe066;border-radius:16px;padding:20px 24px;font-size:0.9rem;color:#7a5c00;line-height:1.7;width:100%;text-align:center;}
  .config-box code{background:rgba(0,0,0,0.07);padding:1px 6px;border-radius:4px;font-size:0.82rem;}
</style>
</head>
<body>
<div class="bg-blob"></div>
<div class="bg-blob"></div>
<div class="bg-blob"></div>

<div class="container">
  <div class="header">
    <h1>🧮 חידון חשבון</h1>
    <p>בוא נראה מה אתה יודע!</p>
  </div>
  <div class="score-bar">
    <div class="score-item c">✅ <span id="sc">0</span></div>
    <div class="score-sep"></div>
    <div class="score-item w">❌ <span id="sw">0</span></div>
    <div class="score-sep"></div>
    <div class="score-item">📝 <span id="st">0</span> שאלות</div>
  </div>
  <div id="main" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:16px;"></div>
</div>

<script>
const SUPABASE_URL = 'https://pswzrkekgbyipeugamqd.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBzd3pya2VrZ2J5aXBldWdhbXFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MTM4MjMsImV4cCI6MjA5MDQ4OTgyM30.HdaM7xXxVom0YwX50Pw4-ODcBGilRNiJz9fY5p29-Os';
const TABLE = 'questions';

const configured = SUPABASE_URL !== 'YOUR_SUPABASE_URL';
const hdrs = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };
const optKeys = { a:'option_a', b:'option_b', c:'option_c', d:'option_d' };
const diffMap = { 1:['d1','קל'], 2:['d2','בינוני'], 3:['d3','קשה'] };

let questions=[], idx=0, correct=0, wrong=0, answered=false;
const main=document.getElementById('main');
const scEl=document.getElementById('sc'), swEl=document.getElementById('sw'), stEl=document.getElementById('st');

function shuffle(a){return [...a].sort(()=>Math.random()-0.5);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

async function init(){
  if(!configured){main.innerHTML=`<div class="config-box">⚙️ <strong>נדרשת הגדרה</strong><br>פתח את הקובץ והחלף<br><code>YOUR_SUPABASE_URL</code> ו-<code>YOUR_SUPABASE_ANON_KEY</code></div>`;return;}
  main.innerHTML=`<div class="state-card"><div class="loading-spinner"></div><h2>טוען שאלות...</h2></div>`;
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=*`,{headers:hdrs});
    if(!r.ok)throw new Error();
    const data=await r.json();
    if(!data.length){main.innerHTML=`<div class="state-card"><div class="big">📭</div><h2>אין שאלות עדיין</h2><p>הוסף שאלות דרך ממשק המנהל</p></div>`;return;}
    questions=shuffle(data);
    stEl.textContent=questions.length;
    showQuestion();
  }catch{main.innerHTML=`<div class="state-card"><div class="big">😕</div><h2>שגיאה בטעינה</h2><p>בדוק את הגדרות ה-Supabase</p></div>`;}
}

function showQuestion(){
  if(idx>=questions.length){showFinish();return;}
  answered=false;
  const q=questions[idx];
  const opts=shuffle(['a','b','c','d'].map(k=>({key:k,val:q[optKeys[k]]})));
  const [dcls,dlbl]=diffMap[q.difficulty]||diffMap[1];
  const illHtml=q.illustration
    ?`<div class="illustration-area">${q.illustration}</div>`
    :`<div class="illustration-area"><div class="no-ill">🔢</div></div>`;

  main.innerHTML=`
    <div class="q-card">
      ${illHtml}
      <div class="q-body">
        <span class="diff-badge ${dcls}">${dlbl}</span>
        <div class="q-text">${esc(q.question_text)}</div>
        <div class="options-grid" id="og">
          ${opts.map(o=>`<button class="opt-btn" onclick="check(this,'${esc(o.val)}','${esc(q[optKeys[q.correct_answer]])}')">
            ${esc(o.val)}
          </button>`).join('')}
        </div>
        <div class="feedback" id="fb"></div>
      </div>
    </div>
    <button class="next-btn" id="nb" onclick="next()">
      ${idx+1<questions.length?'שאלה הבאה ←':'סיום 🎉'}
    </button>`;
}

function check(btn,selected,correctVal){
  if(answered)return;
  answered=true; idx++;
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent.trim()===correctVal)b.classList.add(selected===correctVal?'correct':'reveal');
  });
  const fb=document.getElementById('fb'), nb=document.getElementById('nb');
  if(selected===correctVal){btn.classList.add('correct');fb.textContent='🎉 כל הכבוד! נכון מאוד!';fb.className='feedback correct';correct++;scEl.textContent=correct;}
  else{btn.classList.add('wrong');fb.textContent=`❌ לא נכון. התשובה: ${correctVal}`;fb.className='feedback wrong';wrong++;swEl.textContent=wrong;}
  nb.classList.add('show');
}
function next(){showQuestion();}
function showFinish(){
  const total=correct+wrong, pct=Math.round(correct/total*100);
  const emoji=pct>=80?'🏆':pct>=50?'👍':'💪';
  const msg=pct>=80?'מדהים! אתה כוכב!':pct>=50?'יפה מאוד!':'ממשיכים להתאמן!';
  main.innerHTML=`<div class="state-card"><div class="big">${emoji}</div><h2>${msg}</h2><p style="font-size:1.4rem;font-weight:800;color:var(--blue);margin:16px 0">${correct} מתוך ${total}</p><button class="next-btn show" onclick="restart()" style="margin-top:8px">שוב מהתחלה 🔄</button></div>`;
}
function restart(){correct=0;wrong=0;idx=0;scEl.textContent=0;swEl.textContent=0;questions=shuffle(questions);showQuestion();}

init();
</script>
</body>
</html>
